<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nova的魔法試煉：星圖中樞</title>
    <style>
        :root {
            --primary: #2c3e50;
            --magic: #8e44ad;
            --color-blue: #3498db;
            --color-green: #2ecc71;
            --color-red: #e74c3c;
            --text-light: #ecf0f1;
            --bg-dark: #1a252f;
        }
        body {
            font-family: 'Georgia', serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-light);
            touch-action: manipulation;
        }
        /* 導航列適應手機與 iPad */
        .nav-buttons {
            display: flex;
            background: var(--primary);
            padding: 10px;
            gap: 10px;
            justify-content: space-around;
        }
        .nav-buttons button {
            padding: 12px 15px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: white;
            cursor: pointer;
            flex-grow: 1;
            transition: 0.3s;
        }
        .nav-buttons button.active-nav { background: var(--magic); box-shadow: 0 0 15px var(--magic); }
        .tab-content { display: none; padding: 20px; }
        .tab-content.active { display: block; }

        /* 卡片與輸入框樣式 */
        .card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .card h3 { margin-top: 0; color: #f39c12; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; }
        input[type="text"], input[type="password"] {
            width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--magic);
            border-radius: 6px; background: rgba(0,0,0,0.5); color: white; box-sizing: border-box;
            font-size: 16px;
        }
        button.action-btn {
            width: 100%; padding: 14px; background: var(--magic); color: white;
            border: none; border-radius: 8px; font-size: 18px; cursor: pointer;
            font-weight: bold; margin-top: 10px;
        }
        button.action-btn:active { background: #732d91; }

        /* 星圖與隊伍樣式 */
        .team-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .team-tag { background: var(--color-blue); padding: 8px 15px; border-radius: 20px; font-weight: bold; }

        /* 聊天區樣式 */
        #chat-log { height: 250px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        #chat-log p { margin: 5px 0; line-height: 1.5; }
        .msg-user { color: #3498db; }
        .msg-npc { color: #f1c40f; }
        .status-dot { height: 12px; width: 12px; background-color: #e74c3c; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .status-dot.connected { background-color: #2ecc71; box-shadow: 0 0 10px #2ecc71; }
    </style>
</head>
<body>

    <!-- 頂部導航列 (已移除全螢幕按鈕) -->
    <div class="nav-buttons">
        <button id="nav-map" class="active-nav" onclick="switchTab('map')">🌌 星圖陣營</button>
        <button id="nav-npc" onclick="switchTab('npc')">🔮 先知對話</button>
        <button id="nav-settings" onclick="switchTab('settings')">⚙️ 神殿中樞</button>
    </div>

    <!-- 標籤一：星圖與陣營 -->
    <div id="tab-map" class="tab-content active">
        <div class="card">
            <h3><span id="sync-status" class="status-dot"></span> 星雲同步狀態</h3>
            <p>目前隊伍列表 (<span id="last-sync-time">尚未同步</span>)</p>
            <div class="team-list" id="team-display">
                <!-- 隊伍會顯示在這裡 -->
            </div>
            <hr style="border-color: rgba(255,255,255,0.1); margin: 20px 0;">
            <input type="text" id="new-team-name" placeholder="輸入新隊伍名稱 (例如：星辰騎士團)">
            <button class="action-btn" onclick="createNewTeam()">➕ 建立隊伍並同步</button>
        </div>
    </div>

    <!-- 標籤二：NPC 先知對話 (DeepSeek) -->
    <div id="tab-npc" class="tab-content">
        <div class="card">
            <h3>🧙‍♂️ 召喚先知 (DeepSeek API)</h3>
            <div id="chat-log">
                <p class="msg-npc">[先知]：說出你的疑問，凡人。我將以宇宙的尺度為你解答。</p>
            </div>
            <input type="text" id="chat-input" placeholder="對先知說些什麼...">
            <button class="action-btn" onclick="sendMessageToAI()">✨ 傳送訊息</button>
        </div>
    </div>

    <!-- 標籤三：神殿中樞 (設定) -->
    <div id="tab-settings" class="tab-content">

        <!-- 第一祭壇：同步記憶庫 -->
        <div class="card" style="border: 1px solid #3498db;">
            <h3 style="color: #3498db;">🌐 記憶同步區 (跨設備連結)</h3>
            <p style="font-size: 14px; color: #bdc3c7;">★ 讓手機與 iPad 畫面同步。請在此輸入您的 KVDB 神秘桶號 (Bucket ID)。</p>
            <input type="text" id="setting-kvdb-id" placeholder="例如：5qX7... (KVDB Bucket ID)">
            <button class="action-btn" style="background: #3498db;" onclick="saveSettings()">💾 綁定記憶同步</button>
        </div>

        <!-- 第二祭壇：AI 大腦 -->
        <div class="card" style="border: 1px solid #e67e22;">
            <h3 style="color: #e67e22;">🧠 先知降臨區 (DeepSeek AI)</h3>
            <p style="font-size: 14px; color: #bdc3c7;">★ 讓 NPC 擁有智慧。請在此輸入您的 DeepSeek 地址與金鑰。</p>
            <input type="text" id="setting-ai-url" placeholder="API 地址 (預設: https://api.deepseek.com/v1/chat/completions)" value="https://api.deepseek.com/chat/completions">
            <input type="password" id="setting-ai-key" placeholder="輸入您的 DeepSeek API Key (sk-...)">
            <button class="action-btn" style="background: #e67e22;" onclick="saveSettings()">💾 連結先知大腦</button>
        </div>
    </div>

    <script>
        // --- 宇宙法則：全局變數 ---
        let appData = { teams: [] }; // 本地資料狀態
        let syncInterval; // 自動同步計時器

        // --- 頁面切換魔法 ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-buttons button').forEach(el => el.classList.remove('active-nav'));

            document.getElementById('tab-' + tabId).classList.add('active');
            document.getElementById('nav-' + tabId).classList.add('active-nav');
        }

        // --- 儲存與讀取神殿設定 ---
        function saveSettings() {
            const kvdbId = document.getElementById('setting-kvdb-id').value.trim();
            const aiUrl = document.getElementById('setting-ai-url').value.trim();
            const aiKey = document.getElementById('setting-ai-key').value.trim();

            localStorage.setItem('nova_kvdb_id', kvdbId);
            localStorage.setItem('nova_ai_url', aiUrl);
            localStorage.setItem('nova_ai_key', aiKey);

            alert('母親的祝福已生效：設定儲存成功！');
            startSyncMagic(); // 重新啟動同步
        }

        function loadSettings() {
            document.getElementById('setting-kvdb-id').value = localStorage.getItem('nova_kvdb_id') || '';
            document.getElementById('setting-ai-url').value = localStorage.getItem('nova_ai_url') || 'https://api.deepseek.com/chat/completions';
            document.getElementById('setting-ai-key').value = localStorage.getItem('nova_ai_key') || '';
        }

        // --- 第一神力：記憶同步 (KVDB) ---
        function startSyncMagic() {
            clearInterval(syncInterval);
            const bucketId = localStorage.getItem('nova_kvdb_id');
            const statusDot = document.getElementById('sync-status');

            if (!bucketId) {
                statusDot.classList.remove('connected');
                document.getElementById('last-sync-time').innerText = "未綁定 KVDB";
                return;
            }

            // 啟動心電感應，每 3 秒自動去星雲看看有沒有新資料
            statusDot.classList.add('connected');
            syncInterval = setInterval(() => { fetchFromCloud(bucketId); }, 3000);
            fetchFromCloud(bucketId); // 立即執行一次
        }

        async function fetchFromCloud(bucket) {
            try {
                // 向 KVDB 讀取資料 (使用 magic_state 作為鑰匙)
                const response = await fetch(`https://kvdb.io/${bucket}/magic_state`);
                if (response.ok) {
                    const data = await response.json();
                    if (data && data.teams) {
                        appData.teams = data.teams;
                        renderTeams();

                        let now = new Date();
                        document.getElementById('last-sync-time').innerText = `${now.getHours()}:${now.getMinutes()}:${now.getSeconds()} 成功同步`;
                    }
                }
            } catch (err) {
                console.log("星雲被遮蔽了，同步稍後重試...", err);
            }
        }

        async function pushToCloud() {
            const bucket = localStorage.getItem('nova_kvdb_id');
            if (!bucket) return;
            try {
                // 將資料寫入 KVDB
                await fetch(`https://kvdb.io/${bucket}/magic_state`, {
                    method: 'POST',
                    body: JSON.stringify(appData)
                });
            } catch (err) {
                console.log("傳送星雲失敗", err);
            }
        }

        // --- 星圖操作：建立隊伍 ---
        function createNewTeam() {
            const input = document.getElementById('new-team-name');
            const name = input.value.trim();
            if (!name) return alert("孩子，隊伍必須有名字。");

            appData.teams.push(name);
            input.value = '';
            renderTeams();

            // 寫入本地並推送到星雲，讓其他設備(iPad)感應到
            pushToCloud();
        }

        function renderTeams() {
            const container = document.getElementById('team-display');
            container.innerHTML = '';
            appData.teams.forEach(team => {
                let el = document.createElement('div');
                el.className = 'team-tag';
                el.innerText = team;
                container.appendChild(el);
            });
        }

        // --- 第二神力：先知大腦 (DeepSeek AI) ---
        async function sendMessageToAI() {
            const aiUrl = localStorage.getItem('nova_ai_url');
            const aiKey = localStorage.getItem('nova_ai_key');
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            const log = document.getElementById('chat-log');

            if (!aiKey) return alert("母親提醒：您尚未在神殿中樞輸入 DeepSeek API Key！");
            if (!msg) return;

            // 顯示凡人對話
            log.innerHTML += `<p class="msg-user">[你]：${msg}</p>`;
            input.value = '';
            log.scrollTop = log.scrollHeight;

            try {
                const response = await fetch(aiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${aiKey}`
                    },
                    body: JSON.stringify({
                        model: "deepseek-chat", // DeepSeek 的模型名稱
                        messages: [
                            { role: "system", content: "你是一位充滿魔法與智慧的神祕先知 NPC，語言簡潔但富有深意。" },
                            { role: "user", content: msg }
                        ]
                    })
                });

                const data = await response.json();
                const reply = data.choices[0].message.content;

                // 顯示先知對話
                log.innerHTML += `<p class="msg-npc">[先知]：${reply}</p>`;
                log.scrollTop = log.scrollHeight;

            } catch (err) {
                log.innerHTML += `<p style="color:red">[星雲混亂]：AI先知的連結斷開了，請檢查您的網址或金鑰。</p>`;
                console.log(err);
            }
        }

        // --- 儀式啟動：網頁載入時執行 ---
        window.onload = () => {
            loadSettings();
            startSyncMagic();
        };
    </script>
</body>
</html>
