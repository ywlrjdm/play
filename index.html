<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova的魔法試煉：iPad專屬星圖</title>
    <style>
        :root {
            --primary: #2c3e50; --magic: #8e44ad; --bg: #f4f6f7;
            --color-blue: #3498db; --color-green: #2ecc71; --color-yellow: #f1c40f;
        }
        body { font-family: 'Georgia', serif; background: var(--bg); color: #2c3e50; padding: 20px; text-align: center; margin: 0; min-height: 100vh; background-image: radial-gradient(circle, #e8f8f5 0%, #d4e6f1 100%); overflow-x: hidden; }

        /* 導航列放大，適應 iPad 觸控 */
        .nav-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-bottom: 20px; }
        .nav-buttons button { padding: 12px 18px; font-size: 16px; border: 2px solid #fff; background: var(--primary); color: white; border-radius: 10px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .nav-buttons button.active-nav { background: var(--magic); transform: scale(1.05); }

        /* 全螢幕按鈕專屬樣式 */
        .btn-fullscreen { background: #e67e22 !important; font-weight: bold; }

        /* 卡片容器加寬，適應平板 */
        .card { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 16px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); display: none; margin: 0 auto 20px auto; max-width: 800px; border: 1px solid #dcdde1; }
        .active { display: block; }

        select, input { margin: 10px 0; padding: 15px; width: 100%; max-width: 400px; font-size: 18px; border-radius: 10px; border: 2px solid #bdc3c7; box-sizing: border-box; }
        .action-btn { background: #e67e22; color: white; border: none; font-weight: bold; cursor: pointer; padding: 15px; font-size: 18px; width: 100%; max-width: 400px; border-radius: 10px; margin-top: 10px; box-shadow: 0 4px 10px rgba(230, 126, 34, 0.3); }

        .result-box { margin-top: 20px; padding: 20px; background: #fdfefe; border-radius: 12px; min-height: 100px; text-align: left; border-left: 6px solid var(--magic); line-height: 1.8; font-size: 18px; box-shadow: inset 0 0 10px rgba(0,0,0,0.05); }

        /* iPad 友善的地圖網格佈局 */
        .map-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .map-point { padding: 25px; border-radius: 16px; display: flex; flex-direction: column; align-items: flex-start; box-shadow: 0 6px 15px rgba(0,0,0,0.08); transition: background-color 0.5s ease; border: 2px solid #eee; background-color: #ffffff; }
        .map-point .title { font-size: 22px; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; color: #2c3e50; }

        /* 隊伍顏色選擇器 */
        .color-selector { display: flex; justify-content: center; gap: 15px; margin: 15px 0; }
        .color-option { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: 0.2s; }
        .color-option[data-color="blue"] { background: var(--color-blue); }
        .color-option[data-color="green"] { background: var(--color-green); }
        .color-option[data-color="yellow"] { background: var(--color-yellow); }
        .color-option.selected { border-color: #2c3e50; transform: scale(1.2); box-shadow: 0 0 15px rgba(0,0,0,0.3); }

        /* 標籤與道具彈窗 */
        .sync-badge { position: fixed; top: 10px; right: 20px; background: #27ae60; color: white; padding: 8px 15px; border-radius: 20px; font-size: 14px; z-index: 1000; display: none; font-weight: bold; }
        .inventory-btn { position: fixed; bottom: 30px; right: 30px; background: var(--magic); color: white; width: 70px; height: 70px; border-radius: 50%; font-size: 30px; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 20px rgba(142, 68, 173, 0.4); cursor: pointer; z-index: 999; border: 3px solid #fff; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1001; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: #fff; padding: 30px; border-radius: 20px; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; text-align: left; position: relative; }
        .close-modal { position: absolute; top: 20px; right: 20px; background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }

        .item-row { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 12px; margin: 8px 0; border-radius: 8px; border-left: 5px solid var(--magic); }
        .use-item-btn { background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

    <div id="syncStatus" class="sync-badge">☁️ 星雲已同步</div>

    <!-- 背包懸浮按鈕 -->
    <div class="inventory-btn" onclick="openInventory()">🎒</div>

    <div class="nav-buttons">
        <button class="btn-fullscreen" onclick="toggleFullScreen()">🔲 進入全螢幕</button>
        <button id="btn-settings" onclick="switchTab('settings')">⚙️ 神殿中樞</button>
        <button id="btn-setup" onclick="switchTab('setup')">👥 締結契約</button>
        <button id="btn-map" onclick="switchTab('map')" class="active-nav">🗺️ 星圖疆域</button>
        <button id="btn-trpg" onclick="switchTab('trpg')">🔮 探索秘境</button>
        <button id="btn-npc" onclick="switchTab('npc')">📜 NPC 法寶</button>
    </div>

    <!-- 介面 0：中樞設定 -->
    <div id="settings" class="card">
        <h3 style="color: var(--magic);">⚙️ 神殿中樞 (系統設定)</h3>
        <input type="password" id="apiKeyInput" placeholder="在此貼上你的 API Key">
        <input type="text" id="apiUrlInput" value="https://api.deepseek.com/v1/chat/completions" placeholder="API URL">
        <input type="text" id="modelInput" value="deepseek-chat" placeholder="模型名稱">
        <hr style="border:0; border-top:1px solid #ddd; margin: 20px 0;">
        <input type="text" id="syncCodeInput" placeholder="秘密同步碼 (多設備同步用)">
        <button class="action-btn" onclick="saveSettings()" style="background: var(--magic);">✨ 儲存設定並連結星雲</button>
        <button onclick="clearAllData()" style="background: #c0392b; color: white; width:100%; max-width:400px; padding:15px; font-size:18px; border-radius:10px; margin-top:15px; border:none; cursor:pointer;">⚠️ 重置世界資料</button>
        <div id="settingTip" style="color:green; font-size: 16px; margin-top: 15px;"></div>
    </div>

    <!-- 介面 1：隊伍設定 (綁定顏色) -->
    <div id="setup" class="card">
        <h3>👥 締結靈魂契約 (創建隊伍)</h3>
        <input type="text" id="newTeamName" placeholder="輸入隊伍名稱">
        <div style="font-size: 18px; margin-top: 15px; font-weight: bold;">請選擇隊伍專屬星色：</div>
        <div class="color-selector">
            <div class="color-option" data-color="blue" onclick="selectColor(this)"></div>
            <div class="color-option" data-color="green" onclick="selectColor(this)"></div>
            <div class="color-option" data-color="yellow" onclick="selectColor(this)"></div>
        </div>
        <button class="action-btn" onclick="addTeam()">➕ 寫入星盤</button>
        <div id="teamListContainer" style="margin-top: 25px; text-align: left; font-size: 18px;"></div>
    </div>

    <!-- 介面 2：地圖據點與佔旗 (動態顏色變換) -->
    <div id="map" class="card active" style="max-width: 900px;">
        <h3>🗺️ 星圖疆域 (據點歸屬)</h3>
        <p style="color: #7f8c8d; font-size: 16px;">選擇據點的佔領者，地圖將立刻染上他們的榮耀色彩。</p>
        <div id="mapContainer" class="map-grid"></div>
    </div>

    <!-- 介面 3：探索與事件 (地區專屬生成) -->
    <div id="trpg" class="card">
        <h3>🌌 據點探索與異象</h3>
        <select id="eventTeamSelect"><option value="">-- 完成據點的隊伍 --</option></select>
        <select id="zoneSelect">
            <option value="精靈迷航森林">🌳 精靈迷航森林</option>
            <option value="巨龍隕落廢墟">🐉 巨龍隕落廢墟</option>
            <option value="幻影星光湖泊">🌊 幻影星光湖泊</option>
            <option value="狂風元素高地">🌪️ 狂風元素高地</option>
        </select>
        <button class="action-btn" onclick="drawEvent()">抽取此處的奇遇</button>

        <div id="eventDisplay" style="margin: 20px 0; font-weight: bold; color: var(--primary); font-size: 20px;"></div>

        <input type="text" id="playerAction" placeholder="輸入隊伍的應對動作 (如: 過去摸一下)" style="display:none;">
        <button id="submitActionBtn" class="action-btn" onclick="submitToAI()" style="display:none; background:#27ae60;">✨ 交給命運指引 (開始生成)</button>

        <div id="aiResult" class="result-box">通靈法陣待命中...</div>
    </div>

    <!-- 介面 4：NPC道具 -->
    <div id="npc" class="card">
        <h3>🎁 神祕商人的寶匣</h3>
        <select id="npcTeamSelect"><option value="">-- 領取道具的隊伍 --</option></select>
        <button class="action-btn" onclick="drawItem()">🌟 隨機抽取法寶</button>
        <div id="itemResult" class="result-box" style="font-weight: bold; color: #d35400; text-align: center;"></div>
    </div>

    <!-- 背包彈窗 Modal -->
    <div id="inventoryModal" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeInventory()">關閉</button>
            <h2 style="color: var(--magic); margin-top: 0;">🎒 聖物圖鑑</h2>
            <p style="color: #7f8c8d; font-size: 14px;">此處顯示所有隊伍持有的法寶。法寶使用後請點擊「消耗」，將自動從背包抹除並同步。</p>
            <div id="inventoryContainer"></div>
        </div>
    </div>

    <script>
        // ================= 核心設定與資料結構 =================
        let config = { apiKey: "", apiUrl: "", model: "", syncCode: "" };
        let gameState = {
            teams: [], // { id, name, color, items: [] }
            mapPoints: [
                { id: 'p1', name: '據點一：精靈森林', ownerId: '' },
                { id: 'p2', name: '據點二：巨龍廢墟', ownerId: '' },
                { id: 'p3', name: '據點三：星光湖泊', ownerId: '' },
                { id: 'p4', name: '據點四：狂風高地', ownerId: '' }
            ]
        };

        const itemPool = [
            { name: "✨ 幻影移形旗", desc: "將任一已被佔領據點的旗幟，更換為隨機隊伍的旗幟。" },
            { name: "🌀 虛空吞噬", desc: "沒收任一據點的旗幟，使其變回無主狀態。" },
            { name: "👯 雙生共鳴", desc: "占領目前這一個據點後，直接同步佔領另一個空據點。" },
            { name: "⭐ 星辰祝福", desc: "增加己方該遊戲點的成績總和。" },
            { name: "💨 虛無之塵", desc: "一陣風吹過，什麼也沒發生（空白道具）。" }
        ];

        // 地區專屬事件庫 (為每個區域深度定製)
        const regionEvents = {
            "精靈迷航森林": [
                "灌木叢中沙沙作響，一隻戴著橡果帽子的松鼠精靈跳了出來，遞給你們一片發光的樹葉。",
                "你們不小心踏入了一個由發光蘑菇組成的小法陣，周圍飄舞起綠色的螢火蟲。",
                "一陣充滿花香的微風吹過，藤蔓像有生命般緩緩為你們讓開了一條小路。"
            ],
            "巨龍隕落廢墟": [
                "廢墟中央的巨大龍骨骨架突然散發出微弱的紅光，周圍的空氣變得灼熱起來。",
                "一塊殘破的石碑上，古老的龍語符文因為你們的靠近而重新亮起。",
                "你們在瓦礫中發現了一枚黯淡的龍鱗，當指尖觸碰時，耳邊傳來低沉的龍吟。"
            ],
            "幻影星光湖泊": [
                "寧靜的湖面倒映的不是天空，而是璀璨的宇宙星河。水下似乎有氣泡緩緩升起。",
                "湖邊的一株水晶蘆葦發出清脆的叮噹聲，一隻半透明的水元素探出了頭。",
                "湖水漸漸退去，露出了一把插在湖心礁石上的銀色三叉戟虛影。"
            ],
            "狂風元素高地": [
                "凜冽的強風在你們面前匯聚，逐漸形成了一個小型的龍捲風精靈，擋住了去路。",
                "天上雷雲低垂，一塊原本靜止的懸浮巨石突然開始劇烈震動。",
                "高台邊緣的風鈴發出刺耳的聲響，無形的風刃在地面刻下了奇怪的軌跡。"
            ]
        };

        const destinies = [
            { id: "d1", text: "【時空凝滯】", desc: "全隊陷入了時間的淺灘，需要在原地靜靜等待三分鐘，期間不得進行其他行動。" },
            { id: "d2", text: "【愛之束縛】", desc: "受奇妙的友誼魔法影響，全隊三人必須手比愛心，結伴同行走到下一個任務點。" },
            { id: "d3", text: "【元素禁制】", desc: "觸發了結界，這個據點將暫時封閉，接下來的一輪內禁止任何隊伍挑戰。" },
            { id: "d4", text: "【真理試煉】", desc: "智慧之神降下謎題，隊伍必須正確回答工作人員準備的一道問題，挑戰成績才算有效。" }
        ];

        let selectedTeamColor = "";

        // ================= 初始化與系統 =================
        window.onload = () => {
            const savedConfig = localStorage.getItem('nova_config');
            if (savedConfig) {
                config = JSON.parse(savedConfig);
                document.getElementById('apiKeyInput').value = config.apiKey || "";
                document.getElementById('apiUrlInput').value = config.apiUrl || "https://api.deepseek.com/v1/chat/completions";
                document.getElementById('modelInput').value = config.model || "deepseek-chat";
                document.getElementById('syncCodeInput').value = config.syncCode || "";
            }
            if(config.syncCode) refreshCloudData(); else updateUI();
        };

        // 全螢幕魔法
        function toggleFullScreen() {
            const doc = window.document;
            const docEl = doc.documentElement;
            const requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
            const cancelFullScreen = doc.exitFullscreen || doc.mozCancelFullScreen || doc.webkitExitFullscreen || doc.msExitFullscreen;

            if(!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
                requestFullScreen.call(docEl);
                document.querySelector('.btn-fullscreen').innerText = "🔲 退出全螢幕";
            } else {
                cancelFullScreen.call(doc);
                document.querySelector('.btn-fullscreen').innerText = "🔲 進入全螢幕";
            }
        }

        function switchTab(tabId) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-buttons button').forEach(b => b.classList.remove('active-nav'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active-nav');
            if(tabId !== 'settings') refreshCloudData();
        }

        function saveSettings() {
            config.apiKey = document.getElementById('apiKeyInput').value.trim();
            config.apiUrl = document.getElementById('apiUrlInput').value.trim();
            config.model = document.getElementById('modelInput').value.trim();
            config.syncCode = document.getElementById('syncCodeInput').value.trim();
            localStorage.setItem('nova_config', JSON.stringify(config));
            document.getElementById('settingTip').innerText = "✨ 設定已儲存！";
            refreshCloudData();
        }

        function clearAllData() {
            if(confirm("母親確認：確定要讓這片星空歸零，重置所有隊伍嗎？")) {
                gameState.teams = [];
                gameState.mapPoints.forEach(p => p.ownerId = '');
                syncToCloud(); updateUI();
            }
        }

        // ================= 雲端同步 =================
        async function syncToCloud() {
            if (!config.syncCode) { updateUI(); return; }
            try {
                await fetch(`https://kvdb.io/WqV1Qz8u5Gq8yBvM/nova_ipad_${config.syncCode}`, {
                    method: 'POST', body: JSON.stringify(gameState)
                });
                showSyncBadge(); updateUI();
            } catch(e) { updateUI(); }
        }

        async function refreshCloudData() {
            if (!config.syncCode) return updateUI();
            try {
                const res = await fetch(`https://kvdb.io/WqV1Qz8u5Gq8yBvM/nova_ipad_${config.syncCode}`);
                if (res.ok) {
                    const data = await res.json();
                    if(data && data.mapPoints) gameState = data;
                }
                updateUI(); showSyncBadge();
            } catch(e) { updateUI(); }
        }

        setInterval(() => {
            if(config.syncCode && document.getElementById('map').classList.contains('active')) refreshCloudData();
        }, 8000);

        function showSyncBadge() {
            const badge = document.getElementById('syncStatus');
            badge.style.display = 'block';
            setTimeout(() => badge.style.display = 'none', 1500);
        }

        // ================= UI 更新與邏輯 =================
        function selectColor(element) {
            document.querySelectorAll('.color-option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            selectedTeamColor = element.getAttribute('data-color');
        }

        function getColorHex(colorName) {
            if(colorName === 'blue') return 'rgba(52, 152, 219, 0.4)'; // 柔和的藍
            if(colorName === 'green') return 'rgba(46, 204, 113, 0.4)'; // 柔和的綠
            if(colorName === 'yellow') return 'rgba(241, 196, 15, 0.4)'; // 柔和的黃
            return '#ffffff';
        }
        function getDarkColorHex(colorName) {
            if(colorName === 'blue') return '#2980b9';
            if(colorName === 'green') return '#27ae60';
            if(colorName === 'yellow') return '#d35400';
            return '#7f8c8d';
        }

        function addTeam() {
            const name = document.getElementById('newTeamName').value.trim();
            if(!name) return alert("母親提醒：請輸入隊伍名稱！");
            if(!selectedTeamColor) return alert("母親提醒：請為隊伍選擇一種星辰顏色！");

            gameState.teams.push({ id: Date.now().toString(), name: name, color: selectedTeamColor, items: [] });
            document.getElementById('newTeamName').value = "";
            document.querySelectorAll('.color-option').forEach(el => el.classList.remove('selected'));
            selectedTeamColor = "";
            syncToCloud();
        }

        function changeOwner(pointId, newOwnerId) {
            const p = gameState.mapPoints.find(p => p.id === pointId);
            if(p) { p.ownerId = newOwnerId; syncToCloud(); }
        }

        function updateUI() {
            // 隊伍列表
            document.getElementById('teamListContainer').innerHTML = gameState.teams.map(t =>
                `<div style="background:${getColorHex(t.color)}; padding:15px; border-radius:10px; margin-bottom:10px; border-left:6px solid ${getDarkColorHex(t.color)};">
                    <strong>${t.name}</strong>
                </div>`
            ).join('');

            // 下拉選單
            const options = `<option value="">-- 請選擇隊伍 --</option>` + gameState.teams.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
            document.getElementById('eventTeamSelect').innerHTML = options;
            document.getElementById('npcTeamSelect').innerHTML = options;

            // 星圖地圖渲染 (動態顏色背景)
            let ownerOptions = `<option value="">🏳️ 無主之地</option>` + gameState.teams.map(t => `<option value="${t.id}">🚩 ${t.name}</option>`).join('');

            document.getElementById('mapContainer').innerHTML = gameState.mapPoints.map(p => {
                const ownerInfo = gameState.teams.find(t => t.id === p.ownerId);
                const bgColor = ownerInfo ? getColorHex(ownerInfo.color) : '#ffffff';
                const borderColor = ownerInfo ? getDarkColorHex(ownerInfo.color) : '#eee';

                return `
                <div class="map-point" style="background-color: ${bgColor}; border-color: ${borderColor};">
                    <div class="title">📍 ${p.name}</div>
                    <div style="width:100%; margin-top:10px;">
                        <div style="font-size:14px; margin-bottom:5px;">切換佔領方：</div>
                        <select onchange="changeOwner('${p.id}', this.value)" style="width:100%; padding:10px; font-size:16px;">
                            ${ownerOptions.replace(`value="${p.ownerId}"`, `value="${p.ownerId}" selected`)}
                        </select>
                    </div>
                </div>
            `}).join('');

            renderInventory(); // 同時更新背包
        }

        // ================= 聖物背包管理 =================
        function openInventory() {
            refreshCloudData();
            document.getElementById('inventoryModal').style.display = 'flex';
        }
        function closeInventory() {
            document.getElementById('inventoryModal').style.display = 'none';
        }

        function renderInventory() {
            const container = document.getElementById('inventoryContainer');
            if(gameState.teams.length === 0) {
                container.innerHTML = "<p>星盤上還沒有締結契約的隊伍...</p>";
                return;
            }

            container.innerHTML = gameState.teams.map(t => {
                const itemsHtml = t.items.map((item, idx) => `
                    <div class="item-row">
                        <span>🔸 ${item}</span>
                        <button class="use-item-btn" onclick="useItem('${t.id}', ${idx})">消耗 (刪除)</button>
                    </div>
                `).join('') || `<div style="color:#aaa; font-style:italic; padding:10px;">背包空空如也...</div>`;

                return `
                <div style="margin-bottom:20px; border:2px solid ${getDarkColorHex(t.color)}; border-radius:10px; overflow:hidden;">
                    <div style="background:${getColorHex(t.color)}; padding:10px 15px; font-size:18px; font-weight:bold;">${t.name} 的背包</div>
                    <div style="padding:10px;">${itemsHtml}</div>
                </div>`;
            }).join('');
        }

        function useItem(teamId, itemIndex) {
            const t = gameState.teams.find(t => t.id === teamId);
            if(t) {
                if(confirm(`確定要消耗這個法寶嗎？使用後將永遠消失。`)){
                    t.items.splice(itemIndex, 1);
                    syncToCloud();
                    renderInventory();
                }
            }
        }

        function drawItem() {
            const teamId = document.getElementById('npcTeamSelect').value;
            if(!teamId) return alert("請選擇領取道具的隊伍！");
            const randomlyDrawn = itemPool[Math.floor(Math.random() * itemPool.length)];
            const t = gameState.teams.find(t => t.id === teamId);
            t.items.push(randomlyDrawn.name);
            syncToCloud();

            document.getElementById('itemResult').innerHTML = `
                ✨ <strong>${t.name}</strong> 獲得了：<br>
                <span style="font-size:24px; color:var(--magic);">${randomlyDrawn.name}</span><br>
                <span style="font-size:16px; color:#555;">📝 效果：${randomlyDrawn.desc}</span>
            `;
        }

        // ================= 區域專屬事件與流式 AI =================
        let currentEvent = "";

        function drawEvent() {
            const zone = document.getElementById('zoneSelect').value;
            // 根據選定的區域，抽取對應的專屬文案
            const events = regionEvents[zone];
            currentEvent = events[Math.floor(Math.random() * events.length)];

            document.getElementById('eventDisplay').innerText = `【專屬異象】：${currentEvent}`;
            document.getElementById('playerAction').style.display = 'inline-block';
            document.getElementById('submitActionBtn').style.display = 'inline-block';
            document.getElementById('aiResult').innerText = "隊伍做了什麼？輸入後將即時展開故事...";
            document.getElementById('playerAction').value = "";
        }

        async function submitToAI() {
            if(!config.apiKey) return alert("請先填寫 API 金鑰！");
            const action = document.getElementById('playerAction').value;
            const teamId = document.getElementById('eventTeamSelect').value;
            if(!action || !teamId) return alert("請輸入動作並選擇隊伍！");

            const activeTeam = gameState.teams.find(t=>t.id===teamId);
            const resultBox = document.getElementById('aiResult');
            const btn = document.getElementById('submitActionBtn');
            btn.disabled = true;
            resultBox.innerHTML = "✨ 星辰正為你點亮文字...<br><br>";

            const chosenDestiny = destinies[Math.floor(Math.random() * destinies.length)];

            const systemPrompt = `你是一個魔法世界的嚮導。隊伍【${activeTeam.name}】剛完成任務，遭遇了事件：【${currentEvent}】。
玩家對此的應對動作是：【${action}】。

你的任務：
1. 即時順著玩家的動作去拓展一段生動、充滿魔法感的故事（約100字），要符合事件的環境背景。
2. 在故事結尾，巧妙引導他們完成這個「星辰指引」："${chosenDestiny.desc}"
3. 最後一行強調寫出：【指引結果：${chosenDestiny.text}】。`;

            try {
                const response = await fetch(config.apiUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${config.apiKey}` },
                    body: JSON.stringify({
                        model: config.model,
                        messages: [{"role": "system", "content": systemPrompt}],
                        temperature: 0.8,
                        stream: true
                    })
                });

                if(!response.ok) throw new Error("星雲連結失敗");

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let aiText = "";

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split("\n");

                    for (const line of lines) {
                        if (line.startsWith("data: ") && line !== "data: [DONE]") {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.choices[0].delta.content) {
                                    aiText += data.choices[0].delta.content;
                                    resultBox.innerHTML = aiText.replace(/\n/g, '<br>');
                                }
                            } catch(e) {}
                        }
                    }
                }

                resultBox.innerHTML += `
                    <hr>
                    <div style="color:#27ae60; font-weight:bold; font-size:16px; margin-top:15px;">
                        📌 命運已定，請隊伍開心地完成上述的指引吧！
                    </div>
                `;

            } catch(e) {
                resultBox.innerText = "魔法連接失敗：" + e.message;
            }
            btn.disabled = false;
        }
    </script>
</body>
</html>
